# ═══════════════════════════════════════════════════════════════════════════════
# PRINT-SVC — port 8085 (internal)
# Called by api-gateway. No JWT — workspace context via query param.
# ═══════════════════════════════════════════════════════════════════════════════

  /jobs:
    post:
      tags: [print-svc]
      summary: Create a print job
      description: Called by api-gateway after fetching label data. Not JWT-protected — internal only.
      servers:
        - url: http://localhost:8085
          description: print-svc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label_id, workspace_id]
              properties:
                label_id:     { type: string, format: uuid }
                workspace_id: { type: string, format: uuid }
                user_id:      { type: string, format: uuid }
                product_id:   { type: string, format: uuid }
                format:       { type: string, enum: [pdf, zpl], default: pdf }
                size:         { type: string, example: A4 }
                copies:       { type: integer, default: 1 }
                printer_id:   { type: string }
                label_data:   { $ref: '#/components/schemas/LabelData' }
      responses:
        '202':
          description: Queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string, format: uuid }
                  status: { type: string, example: queued }

  /jobs/{id}:
    get:
      tags: [print-svc]
      summary: Get a print job (includes signed PDF URL when ready)
      servers:
        - url: http://localhost:8085
      parameters:
        - { name: id,           in: path,  required: true, schema: { type: string, format: uuid } }
        - { name: workspace_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrintJob' }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /jobs/{id}/pdf-url:
    get:
      tags: [print-svc]
      summary: Get a fresh presigned S3 URL for a completed PDF job
      servers:
        - url: http://localhost:8085
      parameters:
        - { name: id,           in: path,  required: true, schema: { type: string, format: uuid } }
        - { name: workspace_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Presigned URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:  { type: string, format: uuid }
                  pdf_url: { type: string, format: uri }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

# ═══════════════════════════════════════════════════════════════════════════════
# LABEL-SVC product HTTP — port 8088 (internal)
# Called by api-gateway. Workspace context via X-Workspace-ID header.
# ═══════════════════════════════════════════════════════════════════════════════

  /products:
    post:
      tags: [products-svc]
      summary: Create a product
      servers:
        - url: http://localhost:8088
          description: label-svc product HTTP
      parameters:
        - { name: X-Workspace-ID, in: header, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                sku:            { type: string }
                name:           { type: string }
                category:       { type: string }
                default_fields: { type: object, additionalProperties: { type: string, nullable: true } }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }

    get:
      tags: [products-svc]
      summary: List products for a workspace
      servers:
        - url: http://localhost:8088
      parameters:
        - { name: X-Workspace-ID, in: header, schema: { type: string, format: uuid } }
        - { name: workspace_id,   in: query,  schema: { type: string, format: uuid }, description: "Fallback if header not set" }
        - { name: q,              in: query,  schema: { type: string } }
        - { name: category,       in: query,  schema: { type: string } }
        - { name: page,           in: query,  schema: { type: integer, default: 1 } }
        - { name: per_page,       in: query,  schema: { type: integer, default: 20 } }
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:    { type: integer }
                  products: { type: array, items: { $ref: '#/components/schemas/Product' } }

  /products/{id}:
    get:
      tags: [products-svc]
      summary: Get a product by ID
      servers:
        - url: http://localhost:8088
      parameters:
        - { name: id,           in: path,  required: true, schema: { type: string, format: uuid } }
        - { name: workspace_id, in: query, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

    patch:
      tags: [products-svc]
      summary: Update a product's name, category, or default fields
      servers:
        - url: http://localhost:8088
      parameters:
        - { name: id,             in: path,   required: true, schema: { type: string, format: uuid } }
        - { name: X-Workspace-ID, in: header, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:           { type: string }
                category:       { type: string }
                default_fields: { type: object, additionalProperties: { type: string, nullable: true } }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }

  /products/{id}/print:
    post:
      tags: [products-svc]
      summary: Increment the print counter for a product
      description: Called by print-svc on job completion.
      servers:
        - url: http://localhost:8088
      parameters:
        - { name: id,             in: path,   required: true, schema: { type: string, format: uuid } }
        - { name: X-Workspace-ID, in: header, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Counter incremented
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

# ═══════════════════════════════════════════════════════════════════════════════
# WORKSPACE-SVC billing HTTP — port 8092 (internal)
# POST /checkout called by api-gateway. POST /webhook called by Stripe.
# ═══════════════════════════════════════════════════════════════════════════════

  /checkout:
    post:
      tags: [billing-svc]
      summary: Create a Stripe checkout session
      description: |
        Called by api-gateway after JWT auth. Workspace context is forwarded
        via headers. Returns a Stripe hosted checkout URL.
      servers:
        - url: http://localhost:8092
          description: workspace-svc billing HTTP
      parameters:
        - { name: X-Workspace-ID, in: header, required: true, schema: { type: string, format: uuid } }
        - { name: X-Email,        in: header, required: true, schema: { type: string, format: email } }
        - { name: X-Name,         in: header, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:        { type: string, enum: [starter, business, enterprise] }
                success_url: { type: string, format: uri }
                cancel_url:  { type: string, format: uri }
      responses:
        '200':
          description: Checkout URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:        { type: string, format: uri }
                  session_id: { type: string }
        '400': { description: Invalid plan, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '503': { description: Stripe not configured, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /webhook:
    post:
      tags: [billing-svc]
      summary: Stripe webhook receiver
      description: |
        Called directly by Stripe. Verifies the `Stripe-Signature` header
        (HMAC-SHA256, 5-minute replay window).

        Handled events:
        - `checkout.session.completed` → sets subscription & plan
        - `customer.subscription.updated` → updates plan & period end
        - `customer.subscription.deleted` → downgrades to `free`
      servers:
        - url: http://localhost:8092
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
          description: "Format: `t=<timestamp>,v1=<hmac>`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe event payload
      responses:
        '200': { description: Event processed }
        '401': { description: Invalid signature }
        '400': { description: Bad payload }

